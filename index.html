<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="手のシルエットをポーズで採点するゲーム">
  <title>影絵採点ゲーム</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe Hands（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- ══════════════════════════════════════════════
       #screen-title  タイトル画面
  ══════════════════════════════════════════════ -->
  <section id="screen-title">

    <!-- 背景: 蓄積アートキャンバス（薄く表示） -->
    <canvas id="canvas-art" aria-hidden="true"></canvas>

    <!-- 中央: タイトル + スタートボタン -->
    <div class="title-center">
      <h1 class="game-title">影絵採点ゲーム</h1>
      <button id="btn-start" class="btn-primary"
              onclick="window.GameModule.startGame()">
        スタート
      </button>
      <button class="btn-editor-open"
              onclick="window.EditorModule.openEditor()">
        ✏️ 答えの調整
      </button>
    </div>

    <!-- 左下: カメラプレビュー -->
    <video id="video-preview" autoplay muted playsinline
           aria-label="カメラプレビュー"></video>

    <!-- 右下: ハイスコア上位3件 -->
    <div id="ranking-display" aria-label="ハイスコア">
      <p class="ranking-label">HIGH SCORE</p>
      <ol id="ranking-list"></ol>
    </div>

  </section>


  <!-- ══════════════════════════════════════════════
       #screen-countdown  カウントダウン画面
  ══════════════════════════════════════════════ -->
  <section id="screen-countdown" style="display:none">
    <span id="countdown-number" aria-live="assertive">3</span>
  </section>


  <!-- ══════════════════════════════════════════════
       #screen-play  プレイ画面
  ══════════════════════════════════════════════ -->
  <section id="screen-play" style="display:none">

    <!-- 上部: タイマーバー + 問題番号 -->
    <div class="play-header">
      <div id="timer-bar-track">
        <div id="timer-bar"></div>
      </div>
      <span id="question-number">1 / 5</span>
    </div>

    <!-- メインエリア: 左右分割 -->
    <div class="play-main">

      <!-- 左半分: お題シルエット画像 + 採点ポイントオーバーレイ -->
      <div class="play-left">
        <canvas id="canvas-question" aria-label="お題画像と採点ポイント"></canvas>
      </div>

      <!-- 右半分: カメラ映像 + 骨格オーバーレイ -->
      <div class="play-right">
        <canvas id="canvas-camera" aria-label="カメラ映像と手骨格"></canvas>
      </div>

    </div>

    <!-- 中央浮上: リアルタイムスコア -->
    <div id="score-display" aria-live="polite">---</div>

    <!-- 問題終了時: ベストスコアフラッシュ -->
    <div id="flash-score" style="display:none" aria-live="assertive"></div>

    <!-- 右上: NEW BEST! ラベル -->
    <div id="new-best-label" style="display:none" aria-live="polite">NEW BEST!</div>

  </section>


  <!-- ══════════════════════════════════════════════
       #screen-result  結果画面
  ══════════════════════════════════════════════ -->
  <section id="screen-result" style="display:none">
    <div class="result-card">

      <h2 class="result-heading">RESULT</h2>

      <div class="result-total-wrap">
        <span class="result-total-label">平均スコア</span>
        <span id="result-total" class="result-total-value">0</span>
        <span class="result-total-unit">点</span>
      </div>

      <ol id="result-scores" class="result-scores-list"></ol>

      <p id="result-rank" class="result-rank">-- 位</p>

      <div class="result-buttons">
        <button id="btn-retry" class="btn-primary"
                onclick="window.GameModule.startGame()">
          もう一度
        </button>
        <button class="btn-secondary"
                onclick="window.GameModule.showArtCanvas()">
          影を見る
        </button>
      </div>

    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       #screen-editor  答え骨格調整エディタ
  ══════════════════════════════════════════════ -->
  <section id="screen-editor" style="display:none">

    <!-- ヘッダー -->
    <div class="editor-header">
      <button id="editor-back-btn" class="btn-secondary editor-back-btn">
        ← 戻る
      </button>
      <h2 class="editor-title">答えの骨格調整</h2>
      <div class="editor-header-right">
        <span id="editor-saved-badge" class="editor-saved-badge" style="display:none">
          保存済み ✓
        </span>
      </div>
    </div>

    <!-- ポーズ選択タブ -->
    <div class="editor-tabs" id="editor-tabs"></div>

    <!-- ポーズ名ラベル + 手の本数選択 -->
    <div class="editor-pose-label">
      <span id="editor-pose-name"></span>
      <div class="editor-hand-count" id="editor-hand-count">
        <span class="editor-hand-count-label">手の本数</span>
        <button class="editor-hand-count-btn active" data-count="1">1本</button>
        <button class="editor-hand-count-btn" data-count="2">2本</button>
      </div>
    </div>

    <!-- 手1 / 手2 タブ（2本登録時のみ表示） -->
    <div class="editor-hand-tabs" id="editor-hand-tabs" style="display:none">
      <button class="editor-hand-tab active" data-hand="0">手 1</button>
      <button class="editor-hand-tab" data-hand="1">手 2</button>
    </div>

    <!-- キャンバスエリア（flex:1 で残り高さを確保） -->
    <div class="editor-canvas-wrap" id="editor-canvas-wrap">
      <canvas id="editor-canvas"></canvas>
    </div>

    <!-- 操作説明 / 選択中ポイント名 -->
    <p class="editor-hint" id="editor-point-info">
      ドラッグして骨格点を移動できます
    </p>

    <!-- アクションボタン -->
    <div class="editor-actions">
      <button id="editor-reset-btn" class="btn-secondary">
        リセット
      </button>
      <button id="editor-save-btn" class="btn-primary">
        💾 保存
      </button>
    </div>

  </section>


  <!-- ══════════════════════════════════════════════
       #screen-art  蓄積アート画面
  ══════════════════════════════════════════════ -->
  <section id="screen-art" style="display:none">
    <canvas id="canvas-art-full" aria-label="蓄積影絵キャンバス"></canvas>
    <p id="art-message">あなたの影が残りました</p>
  </section>


  <!-- ══════════════════════════════════════════════
       JS: 依存モジュール → ゲーム本体 の順に読み込む
  ══════════════════════════════════════════════ -->
  <script src="js/constants.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/classifier.js"></script>
  <script src="js/poseExtractor.js"></script>
  <script src="js/snapshot.js"></script>
  <script src="js/artCanvas.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/editor.js"></script>

  <!-- ページ読み込み時の初期化 -->
  <script>
    (async function init() {
      const video  = document.getElementById('video-preview');
      const canvas = document.getElementById('canvas-camera');

      // poses.json を先に読み込む（エディタが即座に使えるように）
      await window.GameModule.initGame();

      // カメラ & MediaPipe 初期化（poses 読み込み完了後）
      await window.CameraModule.initCamera(video, canvas);

      // タイトル背景に蓄積アートを描画
      const artCanvas = document.getElementById('canvas-art');
      window.ArtCanvasModule.drawAllSnapshots(
        artCanvas,
        window.SnapshotModule.loadAllSnapshots()
      );

      // ハイスコア上位3件を表示
      const list = document.getElementById('ranking-list');
      if (list) {
        const top3 = window.RankingModule.getTopN(3);
        list.innerHTML = top3.length
          ? top3.map((e, i) =>
              `<li>
                <span class="rank-num">${i + 1}</span>
                <span class="rank-score">${e.score}点</span>
              </li>`
            ).join('')
          : '<li class="rank-empty">まだ記録がありません</li>';
      }

      // canvas のサイズをウィンドウに合わせる
      function resizeCanvases() {
        const art = document.getElementById('canvas-art');
        if (art) { art.width = window.innerWidth; art.height = window.innerHeight; }

        const artFull = document.getElementById('canvas-art-full');
        if (artFull) { artFull.width = window.innerWidth; artFull.height = window.innerHeight; }

        const cam = document.getElementById('canvas-camera');
        if (cam) {
          const p = cam.parentElement;
          cam.width  = p ? p.clientWidth  : 320;
          cam.height = p ? p.clientHeight : 240;
        }
      }
      resizeCanvases();
      window.addEventListener('resize', resizeCanvases);
    })();
  </script>

  <!-- PWA: Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => {
          console.warn('[sw] 登録に失敗しました:', err);
        });
      });
    }
  </script>

</body>
</html>
